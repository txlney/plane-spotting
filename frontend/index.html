<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, inital-scale=1.0" />
    <title>Plane Spotter Hub</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-rotatedmarker@0.2.0/leaflet.rotatedMarker.min.js"></script>
  </head>

  <body>
    <h1>Aircraft Tracker</h1>

    <section id="login-section">
      <h3>Login</h3>
      <input
        type="text"
        id="login-id"
        placeholder="Username or Email"
        required
      />
      <input type="password" id="login-pass" placeholder="Password" required />
      <button id="login-btn">Login</button>
    </section>

    <section id="test-registration">
      <h3>Test User Registration</h3>
      <input type="text" id="reg-fname" placeholder="Forename" required />
      <input type="text" id="reg-lname" placeholder="Surname" />
      <input type="text" id="reg-user" placeholder="Username" required />
      <input type="password" id="reg-pass" placeholder="Password" required />
      <input type="email" id="reg-email" placeholder="Email Address" required />
      <button id="register-test-btn">Create User</button>
      <p id="reg-status"></p>
    </section>

    <div id="map"></div>
    <div id="status-area"></div>

    <script type="module" src="/app.js"></script>
  </body>

  <footer id="logged-in-message" class="hidden">
    Logged in as: <span id="username-display"></span>
  </footer>
</html>
