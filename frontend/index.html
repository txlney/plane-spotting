<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no"
    />
    <title>SkyLog</title>
    <link rel="icon" href="img/sl-text-blue-white.png" />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-rotatedmarker@0.2.0/leaflet.rotatedMarker.min.js"></script>
  </head>

  <body>
    <nav id="main-nav" class="hidden">
      <div class="nav-group nav-top">
        <button class="nav-btn" id="nav-map" aria-label="Map" title="Map">
          <img
            src="img/signal-svgrepo-com.svg"
            alt="Live Map Icon"
            class="nav-icon"
          />
        </button>
        <button
          class="nav-btn"
          id="nav-logbook"
          aria-label="Logbook"
          title="Logbook"
        >
          <img
            src="img/encyclopedia-svgrepo-com.svg"
            alt="Logbook Icon"
            class="nav-icon"
          />
        </button>
        <button
          class="nav-btn"
          id="nav-stats"
          aria-label="Statistics"
          title="Statistics"
        >
          <img
            src="img/chart-pie-svgrepo-com.svg"
            alt="Statistics Icon"
            class="nav-icon"
          />
        </button>
      </div>
      <div class="nav-group nav-bottom">
        <button
          class="nav-btn"
          id="nav-settings"
          aria-label="Settings"
          title="Settings"
        >
          <img
            src="img/settings-svgrepo-com.svg"
            alt="Settings Icon"
            class="nav-icon"
          />
        </button>
        <button
          class="nav-btn"
          id="nav-profile"
          aria-label="Profile"
          title="Profile"
        >
          <img
            src="img/user-svgrepo-com.svg"
            alt="Profile Icon"
            class="nav-icon"
          />
        </button>
      </div>
    </nav>

    <button id="mobile-profile-btn" class="hidden" aria-label="Profile">
      <img
        src="img/user-svgrepo-com.svg"
        alt="Profile Icon"
        class="mobile-profile-icon"
      />
    </button>

    <section id="login-view" class="auth">
      <div id="login-form">
        <img class="logo" src="img/logo-cream.png" alt="SkyLog logo" />
        <h1>Welcome to <span class="skylog-name">SkyLog!</span></h1>
        <input type="text" id="login-id" placeholder="Username or Email" />
        <input type="password" id="login-pass" placeholder="Your password" />
        <p id="login-status"></p>
        <button id="login-btn" class="blue-btn primary-btn">Log in</button>
      </div>
      <p>or</p>
      <button id="create-account-page-btn" class="yellow-btn secondary-btn">
        Create an account
      </button>
    </section>

    <section id="register-step1-view" class="hidden auth">
      <div id="register-step1-form">
        <img class="logo" src="img/logo-cream.png" alt="SkyLog logo" />
        <h1>
          Let's create your <span class="skylog-name">SkyLog</span> account
        </h1>
        <input type="email" id="reg-email" placeholder="Email Address" />
        <input type="password" id="reg-pass" placeholder="Password" />
        <p id="register-step1-status"></p>
        <button id="register-step1-btn" class="yellow-btn primary-btn">
          Create my account
        </button>
      </div>
      <label id="already-have-account" for="login-page-btn"
        >Already have an account?</label
      >
      <button id="login-page-btn" class="blue-btn secondary-btn">Log in</button>
    </section>

    <section id="register-step2-view" class="hidden auth">
      <div id="register-step2-form">
        <img class="logo" src="img/logo-cream.png" alt="SkyLog logo" />
        <h1>Complete your registration</h1>
        <div class="input-row names">
          <input type="text" id="reg-fname" placeholder="Forename" />
          <input type="text" id="reg-lname" placeholder="Surname" />
        </div>
        <input type="text" id="reg-user" placeholder="Username" />
        <p id="register-step2-status"></p>
        <button id="register-step2-btn" class="yellow-btn primary-btn">
          Complete registration
        </button>
      </div>
      <button id="complete-reg-back-btn" class="blue-btn tertiary-btn">
        Back
      </button>
    </section>

    <section id="map-view" class="hidden">
      <div id="map"></div>
      <div id="status-area">
        <div id="status-area-content">
          <div id="panel-header">
            <h2 id="panel-header-txt">Flight Details</h2>
            <button id="panel-close-btn" aria-label="Close panel">
              &#x2715;
            </button>
          </div>
          <div id="panel-body"></div>
        </div>
      </div>
    </section>

    <section id="logbook-view" class="hidden">
      <div class="logbook-header">
        <h1 id="user-logbook-msg">My Logbook</h1>
        <button id="sort-toggle-btn" class="blue-btn secondary-btn">
          Newest first
        </button>
      </div>
      <div id="logbook-grid" class="logbook-grid"></div>
    </section>

    <section id="statistics-view" class="hidden">
      <div class="statistics-header">
        <h1>User Statistics</h1>
      </div>
    </section>

    <section id="settings-view" class="hidden">
      <div class="settings-header">
        <h1>Application Settings</h1>
      </div>
    </section>

    <section id="profile-view" class="hidden">
      <div class="profile-container">
        <div class="profile-header">
          <h1 id="profile-header-msg">User</h1>
          <button id="mobile-settings-btn" class="blue-btn">
            <img
              src="img/settings-svgrepo-com.svg"
              alt="Settings Icon"
              class="profile-icon-mobile"
            />
          </button>
        </div>

        <div class="profile-row">
          <div id="profile-details-section" class="profile-card">
            <div class="profile-detail-header">
              <h2 class="profile-section-title">My Profile</h2>
              <button id="profile-edit-btn" class="blue-btn profile-header-btn">
                <img
                  src="img/write-svgrepo-com-blue.svg"
                  alt="Edit Icon"
                  class="profile-icon"
                />
              </button>
            </div>
            <div class="profile-detail-row">
              <span class="profile-detail-label">Name</span>
              <span class="profile-detail-value" id="profile-name">—</span>
            </div>
            <div class="profile-detail-row">
              <span class="profile-detail-label">Username</span>
              <span class="profile-detail-value" id="profile-username">—</span>
            </div>
            <div class="profile-detail-row">
              <span class="profile-detail-label">Email</span>
              <span class="profile-detail-value" id="profile-email">—</span>
            </div>
            <div class="profile-detail-row">
              <span class="profile-detail-label">Member since</span>
              <span class="profile-detail-value" id="profile-joined">—</span>
            </div>
          </div>

          <div id="profile-edit-section" class="profile-card hidden">
            <div class="profile-detail-header">
              <h2 class="profile-section-title">Edit Profile</h2>
              <button
                id="profile-edit-cancel-btn"
                class="blue-btn profile-header-btn"
              >
                Cancel
              </button>
            </div>
            <div class="input-row names">
              <input
                type="text"
                id="profile-edit-fname"
                placeholder="First name"
              />
              <input
                type="text"
                id="profile-edit-lname"
                placeholder="Last name"
              />
            </div>
            <input
              type="text"
              id="profile-edit-username"
              placeholder="Username"
            />
            <p id="profile-edit-status"></p>
            <button id="profile-save-btn" class="yellow-btn primary-btn">
              Save changes
            </button>
          </div>

          <div class="profile-card">
            <h2 class="profile-section-title">Change Password</h2>
            <input
              type="password"
              id="profile-current-pass"
              placeholder="Current password"
            />
            <input
              type="password"
              id="profile-new-pass"
              placeholder="New password"
            />
            <input
              type="password"
              id="profile-confirm-pass"
              placeholder="Confirm new password"
            />
            <p id="profile-pass-status"></p>
            <button id="profile-pass-btn" class="blue-btn primary-btn">
              Change password
            </button>
          </div>
        </div>

        <button id="logout-btn" class="logout-btn">Log out</button>
        <button id="delete-btn" class="delete-btn">Delete Account</button>
      </div>
    </section>

    <footer class="hidden">
      <p id="logged-in-message">Logged in as: Unknown</p>
    </footer>

    <script type="module" src="/app.js"></script>
  </body>
</html>
