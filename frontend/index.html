<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, inital-scale=1.0" />
    <title>Plane Spotter Hub</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-rotatedmarker@0.2.0/leaflet.rotatedMarker.min.js"></script>
  </head>

  <body>
    <h1>Plane Spotter Hub</h1>

    <nav id="main-nav" class="hidden">
      <button onclick="showView('map-view')">Live Map</button>
      <button onclick="showView('logbook-view')">Logbook</button>
      <button id="logout-btn">Logout</button>
    </nav>

    <section id="auth-view">
      <div id="login-form">
        <h2>Login</h2>
        <input type="text" id="login-id" placeholder="Username or Email" />
        <input type="password" id="login-pass" placeholder="Password" />
        <button id="login-btn">Login</button>
      </div>
      <p>OR</p>
      <div id="register-form">
        <h2>Register</h2>
        <input type="text" id="reg-fname" placeholder="Forename" />
        <input type="text" id="reg-lname" placeholder="Surname" />
        <input type="email" id="reg-email" placeholder="Email Address" />
        <input type="text" id="reg-user" placeholder="Username" />
        <input type="password" id="reg-pass" placeholder="Password" />
        <button id="register-btn">Create Account</button>
      </div>
      <p id="auth-status"></p>
    </section>

    <section id="map-view" class="hidden">
      <div id="map"></div>
      <div id="status-area"></div>
    </section>

    <section id="logbook-view" class="hidden">
      <h2>My Logbook</h2>
      <div id="logbook-list"></div>
    </section>

    <script type="module" src="/app.js"></script>
  </body>

  <footer id="logged-in-message" class="hidden">
    Logged in as: <span id="username-display"></span>
  </footer>
</html>
